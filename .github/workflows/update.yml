name: Update Dashboard Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      data_updated: ${{ steps.update.outputs.updated }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script (tolerate failure)
        id: update
        continue-on-error: true
        env:
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_USER: ${{ secrets.METABASE_USER }}
          METABASE_PASS: ${{ secrets.METABASE_PASS }}
        run: |
          set +e
          python scripts/update_data.py
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::Metabase 拉取失败 (exit=$rc)，可能是海外 runner 无法访问国内 Metabase。继续用现有 dashboard_data.json 部署。"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi
          exit 0

      - name: Commit and push if changed
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add dashboard_data.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No data change."
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
